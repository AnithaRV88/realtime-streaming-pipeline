services:
  zookeeper:
    image: docker.io/bitnamilegacy/zookeeper:3.9.3-debian-12-r22
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - zookeeper_data:/bitnami/zookeeper

  kafka:
    image: docker.io/bitnamilegacy/kafka:3.7.1-debian-12-r0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    volumes:
      - kafka_data:/bitnami/kafka

  postgres:
    image: docker.io/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streaming}
      POSTGRES_DB: ${POSTGRES_DB:-streaming}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  zookeeper_data:
  kafka_data:
  postgres_data:
